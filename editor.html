<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-English — Slide Editor</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/bYQvFz9s/image.png">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;600;700;800&family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&family=Fredoka:wght@400;600;700&family=Comic+Neue:wght@400;700&family=Georgia&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root{
    --z-blue:#65B2E8; --z-blue-dark:#4A94C7; --z-blue-light:#E6F3FB;
    --z-yellow:#FDCB58; --z-yellow-dark:#E0A92B;
    --bg:#FAFCFE; --ink:#2D3748; --ink-soft:#718096; --line:#E2E8F0;
    --danger:#E53E3E; --danger-light:#FDEDED; --success:#38A169; --success-light:#E9F7EF;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Nunito',sans-serif; background:var(--bg); color:var(--ink); }
  button{ cursor:pointer; font-family:inherit; border:none; }
  h1,h2,h3{ font-family:'Baloo 2',sans-serif; font-weight:800; margin:0; }

  #blocked{ position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; z-index:999; }
  #blocked .card{ max-width:420px; background:#fff; border-radius:20px; padding:36px; box-shadow:0 12px 30px rgba(0,0,0,0.08); }
  #blocked .card i{ font-size:36px; color:var(--z-blue); margin-bottom:12px; }
  #blocked a{ color:var(--z-blue-dark); font-weight:800; text-decoration:none; }

  .topbar{ background:#fff; border-bottom:2px solid var(--line); padding:12px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; position:sticky; top:0; z-index:50; }
  .brand{ font-weight:800; font-size:17px; display:flex; align-items:center; gap:8px; }
  .brand .z{ color:var(--z-yellow-dark); }
  .brand .e{ color:var(--z-blue-dark); }
  .topbar select, .topbar input.small{ padding:8px 10px; border:2px solid var(--line); border-radius:8px; font-weight:700; font-size:0.85rem; }
  .btn{ padding:9px 16px; border-radius:8px; font-weight:800; font-size:0.85rem; display:inline-flex; align-items:center; gap:6px; transition: all .15s; }
  .btn-primary{ background:var(--z-blue); color:#fff; }
  .btn-primary:hover{ background:var(--z-blue-dark); }
  .btn-secondary{ background:var(--z-yellow); color:#fff; }
  .btn-secondary:hover{ background:var(--z-yellow-dark); }
  .btn-outline{ background:#fff; border:2px solid var(--line); color:var(--ink-soft); }
  .btn-outline:hover{ border-color:var(--z-blue); color:var(--z-blue-dark); }
  .btn-danger{ background:var(--danger-light); color:var(--danger); }
  .btn-danger:hover{ background:var(--danger); color:#fff; }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }
  .btn-icon{ width:30px; height:30px; padding:0; display:flex; align-items:center; justify-content:center; border-radius:7px; background:#f0f4f8; color:var(--ink-soft); font-size:12px; }
  .btn-icon:hover{ background:var(--z-blue-light); color:var(--z-blue-dark); }
  .btn-icon.active{ background:var(--z-blue); color:#fff; }
  .spacer{ flex:1; }

  #statusMsg{ font-size:0.82rem; font-weight:700; padding:4px 12px; }
  #statusMsg.error{ color:var(--danger); }
  #statusMsg.success{ color:var(--success); }
  #statusMsg.info{ color:var(--ink-soft); }

  .layout{ display:grid; grid-template-columns:230px 1fr 420px; gap:0; height:calc(100vh - 60px); }
  .col{ overflow-y:auto; padding:16px; }
  .col-slides{ background:#fff; border-right:2px solid var(--line); overflow-x:hidden; }
  .col-elements{ background:var(--bg); }
  .col-preview{ background:#EFF5F9; border-left:2px solid var(--line); display:flex; flex-direction:column; }

  .panel-title{ font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); margin-bottom:10px; }

  .slide-card{ background:#fff; border:2px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:border-color .15s; }
  .slide-card:hover{ border-color:var(--z-blue); }
  .slide-card.active{ border-color:var(--z-blue); background:var(--z-blue-light); }
  .slide-card .row1{ display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .slide-card .badge{ font-size:0.65rem; font-weight:800; text-transform:uppercase; padding:2px 7px; border-radius:10px; background:var(--z-blue-light); color:var(--z-blue-dark); }
  .slide-card .badge.activity{ background:#FFF3D6; color:var(--z-yellow-dark); }
  .slide-card .badge.custom-type{ background:#E0F7F0; color:#0D7C5F; }
  .slide-card .title{ font-weight:700; font-size:0.85rem; margin-top:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .slide-card .actions{ display:flex; gap:4px; margin-top:8px; }
  .add-slide-menu{ display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
  .add-slide-menu .btn{ flex:0 1 auto; justify-content:center; font-size:0.72rem; padding:6px 8px; }

  .elem-card{ background:#fff; border:2px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
  .elem-card .head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .elem-card .kind{ font-weight:800; font-size:0.78rem; color:var(--z-blue-dark); display:flex; align-items:center; gap:6px; }
  .elem-card .actions{ display:flex; gap:4px; }
  .field{ margin-bottom:10px; }
  .field label{ display:block; font-size:0.72rem; font-weight:800; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em; margin-bottom:4px; }
  .field input[type=text], .field input[type=url], .field textarea, .field select{
    width:100%; padding:9px 10px; border:2px solid var(--line); border-radius:8px; font-family:inherit; font-size:0.88rem; outline:none;
  }
  .field input[type=color]{ width:100%; height:38px; padding:3px; border:2px solid var(--line); border-radius:8px; }
  .field input:focus, .field textarea:focus, .field select:focus{ border-color:var(--z-blue); }
  .field textarea{ resize:vertical; min-height:60px; }
  .field-row{ display:flex; gap:10px; }
  .field-row > .field{ flex:1; }
  .checkbox-field{ display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:700; font-size:0.85rem; color:var(--ink); }
  .checkbox-field input{ width:auto; }
  .thumb{ max-width:100%; max-height:120px; border-radius:8px; margin-top:6px; display:block; }
  .upload-row{ display:flex; gap:8px; align-items:center; }
  .upload-row input[type=file]{ display:none; }
  .hint{ font-size:0.75rem; color:var(--ink-soft); margin-top:4px; }
  .pos-block{ border-top:1px dashed var(--line); padding-top:10px; margin-top:6px; }

  .empty-state{ text-align:center; color:var(--ink-soft); font-weight:700; padding:60px 20px; font-size:0.9rem; }

  .add-elem-menu{ position:relative; }
  .add-elem-dropdown{ position:fixed; background:#fff; border:2px solid var(--line); border-radius:10px; box-shadow:0 10px 25px rgba(0,0,0,0.15); padding:6px; z-index:500; min-width:200px; display:none; }
  .add-elem-dropdown.open{ display:block; }
  .add-elem-dropdown button{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; padding:9px 10px; border-radius:7px; background:transparent; font-weight:700; font-size:0.85rem; color:var(--ink); }
  .add-elem-dropdown button:hover{ background:var(--z-blue-light); }

  .preview-toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:8px; }
  .preview-toolbar .btn{ font-size:0.75rem; padding:7px 12px; }
  .preview-toolbar .toolbar-btns{ display:flex; gap:8px; }
  .preview-frame-wrap{ background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(18,59,87,0.08); overflow:hidden; flex:1; min-height:300px; }
  .preview-frame-wrap iframe{ width:100%; height:100%; border:none; display:block; }

  /* ---- Fullscreen preview mode ---- */
  .col-preview.fullscreen{
    position:fixed; inset:0; z-index:200; border:none;
    padding:20px; background:#EFF5F9;
  }
  .col-preview.fullscreen .preview-frame-wrap{ border-radius:16px; }
  body.preview-fullscreen-active{ overflow:hidden; }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }
  @media (max-width:1200px){ .layout{ grid-template-columns:210px 1fr 340px; } }
  @media (max-width:1000px){ .layout{ grid-template-columns:200px 1fr; } .col-preview{ display:none; } .col-preview.fullscreen{ display:flex; } }
</style>
</head>
<body>

<div id="blocked" style="display:none;">
  <div class="card">
    <i class="fas fa-lock"></i>
    <h2 style="margin-bottom:8px;">Admin sign-in required</h2>
    <p style="color:var(--ink-soft); font-weight:700; margin-bottom:16px;">Please sign in as an admin from the main dashboard, then come back to this page.</p>
    <a href="index.html">&larr; Back to dashboard</a>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="brand"><span class="z">Z-</span><span class="e">English</span> &nbsp;·&nbsp; Slide Editor</div>

    <select id="sel-track">
      <option value="basic">Basic</option>
      <option value="advanced">Advanced</option>
    </select>
    <select id="sel-level"></select>
    <select id="sel-session"></select>

    <button class="btn btn-outline" id="loadBtn"><i class="fas fa-cloud-arrow-down"></i> Load</button>
    <button class="btn btn-primary" id="saveBtn"><i class="fas fa-floppy-disk"></i> Save to Session</button>
    <button class="btn btn-outline" id="migrateAllBtn" onclick="runMigrateAllSessions()" title="Scan every saved session, re-host any embedded images/audio/video to Drive, and re-save if changed">
  <i class="fas fa-broom"></i> Migrate All Sessions
</button>

    <span id="statusMsg" class="info"></span>

    <div class="spacer"></div>
    <a href="index.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Dashboard</a>
  </div>

  <div class="layout">
    <div class="col col-slides">
      <div class="panel-title">Slides</div>
      <div id="slideList"></div>
      <div class="add-slide-menu" id="addSlideMenu">
        <button class="btn btn-outline" onclick="addSlide('content')"><i class="fas fa-plus"></i> Content</button>
        <button class="btn btn-outline" onclick="addSlide('activity')"><i class="fas fa-plus"></i> Activity</button>
      </div>
      <div style="margin-top:6px; display:flex; gap:4px; align-items:center; max-width:100%;">
        <input type="text" id="customTypeInput" class="input-ctrl" placeholder="New category..." style="flex:1; min-width:0; font-size:0.75rem; padding:5px 8px; border:1px solid #dce3ea; border-radius:6px;">
        <button class="btn btn-outline" onclick="addCustomType()" style="flex:0 0 auto; font-size:0.72rem; padding:5px 10px; white-space:nowrap;"><i class="fas fa-plus"></i> Add</button>
      </div>
    </div>

    <div class="col col-elements" id="elementsCol">
      <div class="empty-state">Select or add a slide to start editing.</div>
    </div>

    <div class="col col-preview" id="previewCol">
      <div class="preview-toolbar">
        <div class="panel-title" style="margin:0;">Live Preview</div>
        <div class="toolbar-btns">
          <button class="btn btn-outline" id="posModeBtn" onclick="togglePosMode()" title="Drag freely-positioned elements directly in the preview">
            <i class="fas fa-arrows-up-down-left-right"></i> Reposition mode: off
          </button>
          <button class="btn btn-outline" id="fullscreenBtn" onclick="toggleFullscreen()" title="Expand the live preview to fill the screen">
            <i class="fas fa-expand"></i> Fullscreen
          </button>
        </div>
      </div>
      <div class="preview-frame-wrap">
        <iframe id="previewFrame"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbUBusLKsoECjru-XuRHpJkn5xCIf003gG2JmVdG4OolMR2nN-sF8nAFoavT2oPWwI/exec";
const LEVELS_PER_TRACK = 10;
const SESSIONS_PER_LEVEL = 7;

let currentUser = null, sessionToken = null;
let slides = [];          // in-memory structured model
let selectedSlideId = null;
let openAddElemMenuFor = null;
let posModeOn = false;
let previewFullscreenOn = false;

// ---------- auth (reuses the same localStorage session as index.html) ----------
function restoreSession() {
  try {
    const raw = localStorage.getItem('zenglish_session');
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    currentUser = parsed.user; sessionToken = parsed.token;
    return !!(currentUser && sessionToken);
  } catch (e) { return false; }
}

if (!restoreSession() || !currentUser || currentUser.role !== 'admin') {
  document.getElementById('blocked').style.display = 'flex';
} else {
  document.getElementById('app').style.display = 'block';
  initSelects();
}

function initSelects() {
  const levelSel = document.getElementById('sel-level');
  const numSel = document.getElementById('sel-session');
  for (let i = 1; i <= LEVELS_PER_TRACK; i++) levelSel.innerHTML += `<option value="${i}">Level ${i}</option>`;
  for (let i = 1; i <= SESSIONS_PER_LEVEL; i++) numSel.innerHTML += `<option value="${i}">Session ${i}</option>`;
}

function setStatus(msg, kind) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg || '';
  el.className = kind || 'info';
}

async function callBackend(params, retries = 3, backoff = 1000) {
  let payload;
  if (params instanceof URLSearchParams) {
    const obj = {};
    for (const [k, v] of params.entries()) obj[k] = v;
    payload = JSON.stringify(obj);
  } else {
    payload = JSON.stringify(params);
  }

  let res;
  try {
    res = await fetch(GOOGLE_APP_SCRIPT_URL, { 
      method: 'POST', 
      headers: { 'Content-Type': 'text/plain' }, 
      body: payload 
    });
  } catch (networkErr) {
    if (retries > 0) {
      await new Promise(r => setTimeout(r, backoff));
      return callBackend(params, retries - 1, backoff * 2);
    }
    throw new Error('Network/CORS error reaching Apps Script: ' + networkErr.message);
  }
  
  const rawText = await res.text();
  
  if (!res.ok) {
    if (res.status === 429 && retries > 0) {
      await new Promise(r => setTimeout(r, backoff));
      return callBackend(params, retries - 1, backoff * 2);
    }
    throw new Error('HTTP ' + res.status + ' from Apps Script: ' + rawText.slice(0, 300));
  }
  
  try {
    return JSON.parse(rawText);
  } catch (parseErr) {
    if (retries > 0 && rawText.toLowerCase().includes('google')) {
      // Apps Script might have returned an HTML error/captcha page due to rate limiting
      await new Promise(r => setTimeout(r, backoff));
      return callBackend(params, retries - 1, backoff * 2);
    }
    throw new Error('Apps Script did not return JSON (likely a size/auth/deployment issue). Response started with: ' + rawText.slice(0, 300));
  }
}
async function callBackendGet(params) {
  let res;
  try {
    res = await fetch(GOOGLE_APP_SCRIPT_URL + '?' + params.toString());
  } catch (networkErr) {
    throw new Error('Network/CORS error reaching Apps Script: ' + networkErr.message);
  }
  const rawText = await res.text();
  if (!res.ok) {
    throw new Error('HTTP ' + res.status + ' from Apps Script: ' + rawText.slice(0, 300));
  }
  try {
    return JSON.parse(rawText);
  } catch (parseErr) {
    throw new Error('Apps Script did not return JSON (likely a size/auth/deployment issue). Response started with: ' + rawText.slice(0, 300));
  }
}

// ---------- utils ----------
function uid() { return 'e' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36); }
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}
function escAttr(str) { return esc(str).replace(/"/g, '&quot;'); }

function b64EncodeUnicode(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1)));
}
function b64DecodeUnicode(str) {
  return decodeURIComponent(Array.prototype.map.call(atob(str), c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
}

// ---------- custom slide types ----------
function getCustomTypes() {
  try { return JSON.parse(localStorage.getItem('z_editor_custom_types') || '[]'); } catch { return []; }
}
function saveCustomTypes(types) {
  localStorage.setItem('z_editor_custom_types', JSON.stringify(types));
}
function addCustomType() {
  const input = document.getElementById('customTypeInput');
  const name = (input.value || '').trim();
  if (!name) return;
  const slug = name.toLowerCase().replace(/\s+/g, '-');
  const types = getCustomTypes();
  if (types.find(t => t.slug === slug) || slug === 'content' || slug === 'activity') {
    alert('This category already exists.');
    return;
  }
  types.push({ slug, label: name });
  saveCustomTypes(types);
  input.value = '';
  refreshCustomTypeButtons();
}
function deleteCustomType(slug) {
  if (!confirm('Remove this custom category? Existing slides using it will keep their type.')) return;
  saveCustomTypes(getCustomTypes().filter(t => t.slug !== slug));
  refreshCustomTypeButtons();
  renderElemCards();
}
function refreshCustomTypeButtons() {
  const menu = document.getElementById('addSlideMenu');
  menu.querySelectorAll('.custom-type-btn').forEach(b => b.remove());
  getCustomTypes().forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline custom-type-btn';
    btn.innerHTML = `<i class="fas fa-plus"></i> ${esc(t.label)}`;
    btn.onclick = () => addSlide(t.slug);
    btn.oncontextmenu = (e) => { e.preventDefault(); deleteCustomType(t.slug); };
    btn.title = 'Right-click to delete this category';
    menu.appendChild(btn);
  });
}
function getTypeLabel(type) {
  if (type === 'content') return 'Content';
  if (type === 'activity') return 'Activity';
  const ct = getCustomTypes().find(t => t.slug === type);
  return ct ? ct.label : type;
}
function isCustomType(type) {
  return type !== 'content' && type !== 'activity';
}

function blankSlide(type) {
  const label = getTypeLabel(type);
  return { id: uid(), type: type, title: type === 'activity' ? 'New Activity' : 'New Slide', elements: [] };
}

// Browsers normalize inline style colors to rgb(...)/rgba(...) even if the source HTML used hex.
// The color <input> needs a #rrggbb string, so convert back.
function cssColorToHex(str) {
  if (!str) return '';
  str = str.trim();
  if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(str)) return str.length === 4
    ? '#' + str[1]+str[1]+str[2]+str[2]+str[3]+str[3]
    : str;
  const m = /^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i.exec(str);
  if (!m) return '';
  const toHex = n => Number(n).toString(16).padStart(2, '0');
  return '#' + toHex(m[1]) + toHex(m[2]) + toHex(m[3]);
}

// ---------- normalize legacy elements loaded from previously-saved slides ----------
function normalizeSlide(slide) {
  slide.elements = (slide.elements || []).map(el => {
    if (el.kind === 'question') {
      if (!el.blanks) {
        el.blanks = [{
          qtype: el.qtype || 'text',
          answer: el.answer || '',
          altAnswers: Array.isArray(el.altAnswers) ? el.altAnswers : (el.alt ? [el.alt] : []),
          options: Array.isArray(el.options) ? el.options : []
        }];
        delete el.qtype; delete el.answer; delete el.altAnswers; delete el.options; delete el.alt;
      } else {
        el.blanks = el.blanks.map(b => {
          b.qtype = b.qtype || 'text';
          b.altAnswers = Array.isArray(b.altAnswers) ? b.altAnswers : [];
          b.options = Array.isArray(b.options) ? b.options : [];
          return b;
        });
      }
    }
    if (el.pos && (typeof el.pos.top !== 'string' || typeof el.pos.left !== 'string')) {
      el.pos = null;
    }
    return el;
  });
  return slide;
}

// ---------- compile: structured slide -> HTML string the player/backend expect ----------
function compileSlide(slide) {
  const dataComment = '<!--EDITOR_DATA:' + b64EncodeUnicode(JSON.stringify(slide)) + '-->';
  const tagText = getTypeLabel(slide.type).toUpperCase();
  const h1Class = slide.type === 'activity' ? 't-activity' : 't-content';

  let titleStyle = '';
  if (slide.titleColor) titleStyle += `color:${escAttr(slide.titleColor)};`;
  if (slide.titleSize) titleStyle += `font-size:${escAttr(slide.titleSize)}px;`;
  if (slide.titleAlign) titleStyle += `text-align:${escAttr(slide.titleAlign)};`;
  if (slide.titleBold === false) titleStyle += `font-weight:600;`;
  if (slide.titleFont) titleStyle += `font-family:${escAttr(slide.titleFont)};`;
  const titleStyleAttr = titleStyle ? ` style="${titleStyle}"` : '';

  let body = `<span class="frame-tag">${esc(tagText)}</span>\n<h1 class="${h1Class}"${titleStyleAttr}>${esc(slide.title || '')}</h1>\n`;
  let hasQuestion = false;

  slide.elements.forEach(el => {
    let chunk = '';

    if (el.kind === 'paragraph') {
      let pStyle = 'font-size:16px;line-height:1.6;color:var(--ink);margin:0 0 16px;';
      if (el.size) pStyle = pStyle.replace(/font-size:[^;]+;/, `font-size:${escAttr(el.size)}px;`);
      if (el.color) pStyle += `color:${escAttr(el.color)};`;
      if (el.bold) pStyle += 'font-weight:800;';
      if (el.align) pStyle += `text-align:${escAttr(el.align)};`;
      if (el.font) pStyle += `font-family:${escAttr(el.font)};`;
      if (el.bgColor) pStyle += `background-color:${escAttr(el.bgColor)};`;
      if (el.borderWidth) pStyle += `border:${escAttr(el.borderWidth)}px solid ${escAttr(el.borderColor || 'var(--line)')};`;
      if (el.borderRadius) pStyle += `border-radius:${escAttr(el.borderRadius)}px;`;
      if (el.padding) pStyle += `padding:${escAttr(el.padding)}px;`;
      
      const gap = el.lineGap ? `${escAttr(el.lineGap)}px` : '0px';
      const lines = (el.text || '').split('\n').map(line => `<div>${esc(line)}</div>`).join('');
      chunk = `<div style="${pStyle} display:flex; flex-direction:column; gap:${gap};">${lines}</div>\n`;
    } else if (el.kind === 'image') {
      if (el.url) {
        chunk += `<img src="${escAttr(el.url)}" alt="${escAttr(el.caption || '')}" style="max-width:100%;border-radius:16px;margin-bottom:${el.caption ? '6px' : '16px'};box-shadow:0 8px 20px rgba(0,0,0,0.08);">\n`;
        if (el.caption) chunk += `<p style="font-size:13px;color:var(--ink-soft);font-weight:700;margin:0 0 16px;${el.captionFont ? 'font-family:'+escAttr(el.captionFont)+';' : ''}">${esc(el.caption)}</p>\n`;
      }
    } else if (el.kind === 'video') {
      if (el.url) {
        let videoHtml = '';
        if (el.url.includes('drive.google.com') && el.url.includes('id=')) {
          const match = el.url.match(/[?&]id=([^&]+)/);
          if (match && match[1]) {
            videoHtml = `<iframe src="https://drive.google.com/file/d/${match[1]}/preview" width="100%" height="400" frameborder="0" style="border-radius:16px;margin-bottom:${el.caption ? '6px' : '16px'};background:#000;" allow="autoplay" allowfullscreen></iframe>`;
          }
        }
        if (!videoHtml) videoHtml = `<video class="video" src="${escAttr(el.url)}" controls style="width:100%;border-radius:16px;margin-bottom:${el.caption ? '6px' : '16px'};background:#000;"></video>`;
        chunk += videoHtml + '\n';
        if (el.caption) chunk += `<p style="font-size:13px;color:var(--ink-soft);font-weight:700;margin:0 0 16px;${el.captionFont ? 'font-family:'+escAttr(el.captionFont)+';' : ''}">${esc(el.caption)}</p>\n`;
      }
    } else if (el.kind === 'audio') {
      if (el.url) {
        let audioHtml = '';
        if (el.url.includes('drive.google.com') && el.url.includes('id=')) {
          const match = el.url.match(/[?&]id=([^&]+)/);
          if (match && match[1]) {
            audioHtml = `<div class="z-audio" data-drive-id="${match[1]}">
              <button class="z-audio-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5.14v14l11-7-11-7z"/></svg></button>
              <div class="z-audio-info">
                <div class="z-audio-track"><div class="z-audio-fill"></div></div>
              </div>
              <div class="z-audio-time">0:00 / 0:00</div>
            </div>`;
          }
        }
        if (!audioHtml) audioHtml = `<audio src="${escAttr(el.url)}" controls style="width:100%;margin-bottom:${el.caption ? '6px' : '16px'};"></audio>`;
        chunk += audioHtml + '\n';
        if (el.caption) chunk += `<p style="font-size:13px;color:var(--ink-soft);font-weight:700;margin:0 0 16px;${el.captionFont ? 'font-family:'+escAttr(el.captionFont)+';' : ''}">${esc(el.caption)}</p>\n`;
      }
    } else if (el.kind === 'question') {
      hasQuestion = true;
      const qStyleAttr = el.font ? ` style="font-family:${escAttr(el.font)};"` : '';
      chunk = `<div class="question-block"${qStyleAttr}><span class="exletter">?</span> `;
      
      const parts = (el.prompt || '').split('[blank]');
      for (let i = 0; i < parts.length; i++) {
        chunk += esc(parts[i]);
        if (i < parts.length - 1) {
          const b = (el.blanks && el.blanks[i]) || { qtype: 'text', answer: '', altAnswers: [], options: [] };
          const altList = (b.altAnswers || []).filter(Boolean);
          const altAttr = altList.length ? ` data-alt="${escAttr(altList.join('|'))}"` : '';
          if (b.qtype === 'select') {
            const opts = (b.options || []).map(o => `<option value="${escAttr(o)}">${esc(o)}</option>`).join('');
            chunk += `<select class="interactive-select" data-answer="${escAttr(b.answer)}"${altAttr}><option value="">--</option>${opts}</select>`;
          } else {
            chunk += `<input type="text" class="interactive-input" placeholder="Type answer..." data-answer="${escAttr(b.answer)}"${altAttr}>`;
          }
        }
      }
      
      if (parts.length === 1 && el.blanks && el.blanks.length > 0) {
        chunk += " ";
        const b = el.blanks[0];
        const altList = (b.altAnswers || []).filter(Boolean);
        const altAttr = altList.length ? ` data-alt="${escAttr(altList.join('|'))}"` : '';
        if (b.qtype === 'select') {
          const opts = (b.options || []).map(o => `<option value="${escAttr(o)}">${esc(o)}</option>`).join('');
          chunk += `<select class="interactive-select" data-answer="${escAttr(b.answer)}"${altAttr}><option value="">--</option>${opts}</select>`;
        } else {
          chunk += `<input type="text" class="interactive-input" placeholder="Type answer..." data-answer="${escAttr(b.answer)}"${altAttr}>`;
        }
      }
      chunk += `</div>\n`;
    } else if (el.kind === 'list') {
      let items = (el.items || []).map(it => `<li><span class="n">•</span> ${esc(it.text)}${it.time ? `<span class="time">${esc(it.time)}</span>` : ''}</li>`).join('');
      const listStyleAttr = el.font ? ` style="font-family:${escAttr(el.font)};"` : '';
      chunk = `<ol class="agenda"${listStyleAttr}>${items}</ol>\n`;
    } else if (el.kind === 'raw') {
      chunk = (el.html || '') + '\n';
    } else if (el.kind === 'link') {
      const linkStyle = `display:flex; align-items:center; justify-content:space-between; padding:16px 22px; background-color:${escAttr(el.bgColor || '#007BFF')}; color:${escAttr(el.color || '#FFFFFF')}; text-decoration:none; border-radius:12px; font-weight:bold; font-size:18px; box-shadow:0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s; border:2px solid rgba(0,0,0,0.05);`;
      chunk = `<div style="margin:16px 0;"><a href="${escAttr(el.url)}" target="_blank" style="${linkStyle}"><span>${esc(el.text || 'Click Here')}</span><i class="fas fa-external-link-alt"></i></a></div>\n`;
    }

    if (!chunk) return;

    if (el.pos) {
      body += `<div class="editor-pos-el" data-el-id="${escAttr(el.id)}" style="position:absolute; top:${escAttr(el.pos.top)}; left:${escAttr(el.pos.left)}; max-width:80%;">${chunk}</div>\n`;
    } else {
      body += chunk;
    }
  });

  if (hasQuestion) {
    body += `<button class="check-btn" onclick="checkAnswers(this)">&#10003; Check Answers</button>\n`;
  }

  return dataComment + `\n<div class="frame">\n${body}</div>`;
}

// ---------- parse: HTML string (from backend) -> structured slide ----------
function parseSlideHTML(html) {
  const m = /^<!--EDITOR_DATA:([A-Za-z0-9+/=]+)-->/.exec(html);
  if (m) {
    try {
      const slide = JSON.parse(b64DecodeUnicode(m[1]));
      if (slide && slide.id && Array.isArray(slide.elements)) return normalizeSlide(slide);
    } catch (e) { /* fall through to legacy handling */ }
  }
  // No EDITOR_DATA comment — this slide was hand-authored (or built by some other JSON
  // tool) directly as HTML. Parse its structure into real, editable elements instead of
  // dumping the whole thing into one raw block. Anything we don't recognize is kept as
  // an editable "raw" element so it round-trips without data loss.
  try {
    return parseLegacySlideHTML(html);
  } catch (e) {
    console.error('Legacy slide parse failed, falling back to raw block:', e);
    return { id: uid(), type: 'content', title: '(Unparsed slide — edit as raw HTML)', elements: [{ id: uid(), kind: 'raw', html: html }] };
  }
}

// Scans EVERY session with saved content, re-hosts any embedded data: media,
// and re-saves only the ones that actually had something to migrate. Uses
// local variables throughout — never touches the slides/selectedSlideId
// you're currently editing in the main panel.
async function runMigrateAllSessions() {
  if (!confirm('This scans every saved session, re-hosts any embedded (data:) images/audio/video to Drive, and re-saves sessions that changed. It can take a while for many sessions and will overwrite those specific sessions with the migrated version. Continue?')) return;

  const btn = document.getElementById('migrateAllBtn');
  btn.disabled = true;
  setStatus('Scanning all sessions...', 'info');

  try {
    const listResult = await callBackendGet(new URLSearchParams({ action: 'listLessonContentSessions', token: sessionToken }));
    if (listResult.expired) { setStatus('Your session expired — please sign in again from the dashboard.', 'error'); return; }
    if (!listResult.success) { setStatus(listResult.message || 'Could not list sessions.', 'error'); return; }

    const sessionsList = listResult.sessions || [];
    let checkedCount = 0, migratedCount = 0, errorCount = 0;

    for (const s of sessionsList) {
      checkedCount++;
      setStatus(`Checking ${checkedCount}/${sessionsList.length}: ${s.track} L${s.level} S${s.sessionNumber}...`, 'info');
      try {
        const result = await callBackendGet(new URLSearchParams({
          action: 'getLessonContentForEdit', token: sessionToken,
          track: s.track, level: s.level, sessionNumber: s.sessionNumber
        }));
        if (!result.success) { errorCount++; continue; }

        const parsedSlides = (result.slides || []).map(parseSlideHTML);
        const hasInlineMedia = parsedSlides.some(sl => sl.elements.some(el => el.url && el.url.startsWith('data:')));
        if (!hasInlineMedia) continue; // nothing to do for this session

        for (const sl of parsedSlides) await migrateInlineDataUrls(sl);

        const compiledSlides = parsedSlides.map(compileSlide);
        const slidesJson = JSON.stringify(compiledSlides);
        const saveResult = await callBackend(new URLSearchParams({
          action: 'setLessonContent', token: sessionToken,
          track: s.track, level: s.level, sessionNumber: s.sessionNumber, slidesJson
        }));
        if (saveResult.success) migratedCount++; else errorCount++;
      } catch (err) {
        console.error('Migration failed for', s, err);
        errorCount++;
      }
    }

    setStatus(`Done. Checked ${checkedCount} session(s), migrated ${migratedCount}, ${errorCount} error(s).`,
      errorCount > 0 ? 'error' : 'success');
  } catch (err) {
    console.error('runMigrateAllSessions failed:', err);
    setStatus('Could not reach the server: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
  }
}
  
async function migrateInlineDataUrls(slide) {
  if (slide._migratedMedia) return slide;
  let didWork = false;
  for (const el of slide.elements) {
    if ((el.kind === 'image' || el.kind === 'video' || el.kind === 'audio') &&
        el.url && el.url.startsWith('data:')) {
      const match = /^data:([^;]+);base64,(.+)$/.exec(el.url);
      if (!match) continue;
      const [, mimeType, base64] = match;
      try {
        const body = new URLSearchParams({
          action: 'uploadMedia', token: sessionToken,
          filename: 'migrated_' + el.id + '.' + (mimeType.split('/')[1] || 'bin'),
          mimeType, dataBase64: base64
        });
        const result = await callBackend(body);
        if (result.success) { el.url = result.url; didWork = true; }
        else console.error('Migration upload failed for', el.id, result.message);
      } catch (e) {
        console.error('Could not migrate inline media for element', el.id, e);
      }
    }
  }
  slide._migratedMedia = true; // stops this from re-running on future loads of this slide
  return didWork ? slide : slide;
}
  
function parseLegacySlideHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const frame = doc.querySelector('.frame') || doc.body;

  const h1 = frame.querySelector('h1');
  const type = (h1 && h1.classList.contains('t-activity')) ? 'activity' : 'content';
  const slide = { id: uid(), type: type, title: h1 ? h1.textContent.trim() : '(untitled)', elements: [] };

  if (h1) {
    const c = cssColorToHex(h1.style.color);
    if (c) slide.titleColor = c;
    if (h1.style.fontSize) { const n = parseInt(h1.style.fontSize, 10); if (!isNaN(n)) slide.titleSize = String(n); }
    if (h1.style.textAlign) slide.titleAlign = h1.style.textAlign;
    if (h1.style.fontFamily) slide.titleFont = h1.style.fontFamily;
    if (h1.style.fontWeight === '600') slide.titleBold = false;
  }

  const kids = Array.from(frame.children).filter(n =>
    n.tagName !== 'H1' && !(n.classList && n.classList.contains('frame-tag')) &&
    !(n.tagName === 'BUTTON' && n.classList.contains('check-btn'))
  );

  const isCaptionP = (node) => node && node.tagName === 'P' && /(^|;)\s*font-size:\s*13px/i.test(node.getAttribute('style') || '');

  for (let i = 0; i < kids.length; i++) {
    const node = kids[i];
    const tag = node.tagName;

    if ((tag === 'P' || tag === 'DIV') && !isCaptionP(node) && !node.classList.contains('question-block')) {
      let htmlContent = node.innerHTML.replace(/<br\s*[\/]?>/gi, '\n');
      let tmp = document.createElement('div');
      tmp.innerHTML = htmlContent;
      slide.elements.push({
        id: uid(), kind: 'paragraph', pos: null,
        text: tmp.textContent.trim(),
        color: cssColorToHex(node.style.color) || '',
        size: node.style.fontSize ? String(parseInt(node.style.fontSize, 10)) : '',
        bold: node.style.fontWeight === '800' || node.style.fontWeight === 'bold',
        align: node.style.textAlign || '',
        font: node.style.fontFamily || ''
      });
    } else if (tag === 'IMG' || tag === 'VIDEO' || tag === 'AUDIO') {
      const next = kids[i + 1];
      let caption = '';
      if (isCaptionP(next)) { caption = next.textContent.trim(); i++; }
      const kindMap = { IMG: 'image', VIDEO: 'video', AUDIO: 'audio' };
      slide.elements.push({
        id: uid(), kind: kindMap[tag], pos: null,
        url: node.getAttribute('src') || '',
        caption: caption
      });
    } else if (tag === 'DIV' && node.classList.contains('question-block')) {
      let promptPieces = [];
      let blanks = [];
      for (let n of Array.from(node.childNodes)) {
        if (n.nodeType === Node.TEXT_NODE) {
          promptPieces.push(n.textContent);
        } else if (n.nodeName === 'INPUT' && n.classList.contains('interactive-input')) {
          promptPieces.push('[blank]');
          blanks.push({
            qtype: 'text',
            answer: n.getAttribute('data-answer') || '',
            altAnswers: (n.getAttribute('data-alt') || '').split('|').map(s=>s.trim()).filter(Boolean),
            options: []
          });
        } else if (n.nodeName === 'SELECT' && n.classList.contains('interactive-select')) {
          promptPieces.push('[blank]');
          blanks.push({
            qtype: 'select',
            answer: n.getAttribute('data-answer') || '',
            altAnswers: (n.getAttribute('data-alt') || '').split('|').map(s=>s.trim()).filter(Boolean),
            options: Array.from(n.querySelectorAll('option')).map(o => o.value).filter(v => v !== '')
          });
        }
      }
      
      let prompt = promptPieces.join('').replace(/\s+/g, ' ').trim();
      if (blanks.length === 0) {
        slide.elements.push({ id: uid(), kind: 'raw', pos: null, html: node.outerHTML });
        continue;
      }
      
      // If it ends with [blank], that's the legacy single-blank style.
      // But we can just keep the [blank] at the end, it will work correctly in compileSlide.
      slide.elements.push({ id: uid(), kind: 'question', pos: null, prompt, blanks, font: node.style.fontFamily || '' });
    } else if (tag === 'OL' && node.classList.contains('agenda')) {
      const items = Array.from(node.querySelectorAll('li')).map(li => {
        const timeEl = li.querySelector('.time');
        const time = timeEl ? timeEl.textContent.trim() : '';
        const numEl = li.querySelector('.n');
        let text = li.textContent.trim();
        if (numEl) text = text.replace(numEl.textContent, '');
        if (timeEl) text = text.replace(timeEl.textContent, '');
        return { text: text.trim(), time };
      });
      slide.elements.push({ id: uid(), kind: 'list', pos: null, items, font: node.style.fontFamily || '' });
    } else {
      // Anything unrecognized (custom markup, tables, embeds, etc.) stays fully intact
      // and still editable — just as a raw HTML block instead of structured fields.
      slide.elements.push({ id: uid(), kind: 'raw', pos: null, html: node.outerHTML });
    }
  }

  return slide;
}

function renderSlideList() {
  const list = document.getElementById('slideList');
  list.innerHTML = '';
  slides.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'slide-card' + (s.id === selectedSlideId ? ' active' : '');
    card.onclick = () => selectSlide(s.id);
    card.innerHTML = `
      <div class="row1">
        <span class="badge ${s.type === 'activity' ? 'activity' : (isCustomType(s.type) ? 'custom-type' : '')}">${esc(getTypeLabel(s.type))}</span>
        <span style="font-size:0.72rem; color:var(--ink-soft); font-weight:700;">#${i + 1}</span>
      </div>
      <div class="title">${esc(s.title || '(untitled)')}</div>
      <div class="actions">
        <button class="btn-icon" title="Move up" onclick="event.stopPropagation(); moveSlide('${s.id}', -1)"><i class="fas fa-arrow-up"></i></button>
        <button class="btn-icon" title="Move down" onclick="event.stopPropagation(); moveSlide('${s.id}', 1)"><i class="fas fa-arrow-down"></i></button>
        <button class="btn-icon" title="Duplicate" onclick="event.stopPropagation(); duplicateSlide('${s.id}')"><i class="fas fa-copy"></i></button>
        <button class="btn-icon" title="Delete" onclick="event.stopPropagation(); deleteSlide('${s.id}')"><i class="fas fa-trash"></i></button>
      </div>`;
    list.appendChild(card);
  });
}

function addSlide(type) {
  const s = blankSlide(type);
  slides.push(s);
  selectSlide(s.id);
}
function moveSlide(id, dir) {
  const i = slides.findIndex(s => s.id === id);
  const j = i + dir;
  if (j < 0 || j >= slides.length) return;
  [slides[i], slides[j]] = [slides[j], slides[i]];
  renderSlideList(); updatePreview();
}
function duplicateSlide(id) {
  const i = slides.findIndex(s => s.id === id);
  if (i === -1) return;
  const copy = JSON.parse(JSON.stringify(slides[i]));
  copy.id = uid();
  copy.elements.forEach(el => el.id = uid());
  copy.title += ' (copy)';
  slides.splice(i + 1, 0, copy);
  selectSlide(copy.id);
}
function deleteSlide(id) {
  if (!confirm('Delete this slide?')) return;
  slides = slides.filter(s => s.id !== id);
  if (selectedSlideId === id) selectedSlideId = slides.length ? slides[0].id : null;
  renderSlideList(); renderElements(); updatePreview();
}
function selectSlide(id) {
  selectedSlideId = id;
  renderSlideList(); renderElements(); updatePreview();
}
function getSelectedSlide() { return slides.find(s => s.id === selectedSlideId) || null; }

function toggleAddElemMenu() {
  const dropdown = document.getElementById('addElemDropdown');
  const opening = !dropdown.classList.contains('open');
  if (opening) positionAddElemDropdown();
  dropdown.classList.toggle('open', opening);
}
function positionAddElemDropdown() {
  const btn = document.querySelector('.add-elem-menu > .btn');
  const dropdown = document.getElementById('addElemDropdown');
  if (!btn || !dropdown) return;
  const rect = btn.getBoundingClientRect();
  dropdown.style.top = (rect.bottom + 6) + 'px';
  // Anchor to the button's right edge (via `right`) so it never overflows off the right
  // side of the narrow column, and clamp so it never goes off the left edge either.
  let right = window.innerWidth - rect.right;
  if (right < 8) right = 8;
  dropdown.style.right = right + 'px';
  dropdown.style.left = 'auto';
}
document.addEventListener('click', (e) => {
  const menu = document.getElementById('addElemDropdown');
  if (menu && !e.target.closest('.add-elem-menu')) menu.classList.remove('open');
});
window.addEventListener('resize', () => {
  const dropdown = document.getElementById('addElemDropdown');
  if (dropdown && dropdown.classList.contains('open')) positionAddElemDropdown();
});
document.addEventListener('scroll', () => {
  const dropdown = document.getElementById('addElemDropdown');
  if (dropdown && dropdown.classList.contains('open')) dropdown.classList.remove('open');
}, true);

function updateSlideField(field, value) {
  const slide = getSelectedSlide();
  if (!slide) return;
  slide[field] = value;
  renderSlideList(); updatePreview();
}

function addElement(kind) {
  const slide = getSelectedSlide();
  if (!slide) return;
  document.getElementById('addElemDropdown').classList.remove('open');
  let el = { id: uid(), kind, pos: null };
  if (kind === 'paragraph') el = { ...el, text: '', bold: false, color: '', size: '', align: '' };
  if (kind === 'image') el = { ...el, url: '', caption: '' };
  if (kind === 'video') el = { ...el, url: '', caption: '' };
  if (kind === 'audio') el = { ...el, url: '', caption: '' };
  if (kind === 'question') el = { ...el, blanks: [{ qtype: 'text', answer: '', altAnswers: [], options: [] }], prompt: '' };
  if (kind === 'list') el = { ...el, items: [{ text: '', time: '' }] };
  if (kind === 'raw') el = { ...el, html: '' };
  if (kind === 'link') el = { ...el, url: '', text: '', bgColor: '#007BFF', color: '#FFFFFF' };
  slide.elements.push(el);
  renderElemCards(slide); updatePreview();
}
function moveElement(elId, dir) {
  const slide = getSelectedSlide(); if (!slide) return;
  const i = slide.elements.findIndex(e => e.id === elId);
  const j = i + dir;
  if (j < 0 || j >= slide.elements.length) return;
  [slide.elements[i], slide.elements[j]] = [slide.elements[j], slide.elements[i]];
  renderElemCards(slide); updatePreview();
}
function deleteElement(elId) {
  const slide = getSelectedSlide(); if (!slide) return;
  slide.elements = slide.elements.filter(e => e.id !== elId);
  renderElemCards(slide); updatePreview();
}

function renderElemCards(slide) {
  const wrap = document.getElementById('elemList');
  if (!wrap) return;
  if (slide.elements.length === 0) {
    wrap.innerHTML = '<div class="empty-state" style="padding:30px 10px;">No elements yet — click "Add" above.</div>';
    return;
  }
  wrap.innerHTML = slide.elements.map((el, i) => elemCardHTML(el, i, slide.elements.length)).join('');
}

function updateElField(elId, field, value) {
  const slide = getSelectedSlide(); if (!slide) return;
  const el = slide.elements.find(e => e.id === elId); if (!el) return;
  
  let oldBlanksCount = (el.blanks || []).length;
  el[field] = value;
  
  if (field === 'prompt' && el.kind === 'question') {
    let promptParts = (value || '').split('[blank]');
    let numBlanks = promptParts.length > 1 ? promptParts.length - 1 : 1;
    if (!el.blanks) el.blanks = [];
    while (el.blanks.length < numBlanks) {
      el.blanks.push({ qtype: 'text', answer: '', altAnswers: [], options: [] });
    }
    // Only re-render if the number of answer boxes changed to prevent losing input focus!
    if (el.blanks.length !== oldBlanksCount || numBlanks !== oldBlanksCount) {
      renderElemCards(slide);
    }
  }
  updatePreview();
}

function updateElBlank(elId, idx, field, value) {
  const slide = getSelectedSlide(); if (!slide) return;
  const el = slide.elements.find(e => e.id === elId); if (!el) return;
  if (!el.blanks) return;
  let b = el.blanks[idx];
  if (!b) return;

  if (field === 'options' || field === 'altAnswers') {
    b[field] = value.split('\n').map(s=>s.trim()).filter(Boolean);
  } else {
    b[field] = value;
  }
  
  if (field === 'qtype') {
    renderElemCards(slide);
  }
  updatePreview();
}
function updateElItems(elId, text) {
  const slide = getSelectedSlide(); if (!slide) return;
  const el = slide.elements.find(e => e.id === elId); if (!el) return;
  el.items = text.split('\n').map(line => {
    const parts = line.split('|');
    return { text: (parts[0] || '').trim(), time: (parts[1] || '').trim() };
  }).filter(it => it.text);
  updatePreview();
}
function refreshThumb(elId) {
  const slide = getSelectedSlide(); if (!slide) return;
  const el = slide.elements.find(e => e.id === elId); if (!el) return;
  const img = document.getElementById('thumb-' + elId);
  if (img) { img.src = el.url; img.style.display = el.url ? 'block' : 'none'; }
}

async function processUploads(elId, input, maxMB) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const slide = getSelectedSlide(); if (!slide) return;
  
  let currentElId = elId;
  const originalElIndex = slide.elements.findIndex(e => e.id === elId);
  if (originalElIndex === -1) return;
  const originalEl = slide.elements[originalElIndex];

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    let targetElId = elId;
    
    if (i > 0) {
      targetElId = uid();
      let newEl = JSON.parse(JSON.stringify(originalEl));
      newEl.id = targetElId;
      newEl.url = ''; 
      newEl.caption = '';
      slide.elements.splice(originalElIndex + i, 0, newEl);
      renderElemCards(slide); // Re-render to show the new element
    }
    
    const statusEl = document.getElementById('uploadStatus-' + targetElId);
    if (!statusEl) continue;
    
    if (file.size > maxMB * 1024 * 1024) {
      statusEl.textContent = `Too large (max ${maxMB}MB).`; statusEl.style.color = 'var(--danger)';
      continue;
    }
    
    statusEl.textContent = 'Uploading...'; statusEl.style.color = 'var(--ink-soft)';

    try {
      const base64 = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
      
      const body = new URLSearchParams({ action: 'uploadMedia', token: sessionToken, filename: file.name, mimeType: file.type, dataBase64: base64 });
      const result = await callBackend(body);
      
      if (!result.success) { statusEl.textContent = result.message || 'Upload failed.'; statusEl.style.color = 'var(--danger)'; continue; }
      
      const targetEl = slide.elements.find(e => e.id === targetElId);
      if (targetEl) targetEl.url = result.url;
      
      statusEl.textContent = 'Uploaded ✓'; statusEl.style.color = 'var(--success)';
      renderElemCards(slide);
      updatePreview();
      
      // Delay slightly between multiple uploads to avoid tripping Google's anti-abuse rate limiter
      if (i < files.length - 1) await new Promise(r => setTimeout(r, 1500));
    } catch (err) {
      statusEl.textContent = 'Upload failed: ' + err.message; statusEl.style.color = 'var(--danger)';
    }
  }
}

function uploadImage(elId, input) {
  processUploads(elId, input, 8);
}

function uploadMediaFile(elId, input, kind) {
  const maxMB = kind === 'image' ? 8 : 64;
  processUploads(elId, input, maxMB);
}

function toggleFullscreen() {
  previewFullscreenOn = !previewFullscreenOn;
  const col = document.getElementById('previewCol');
  const btn = document.getElementById('fullscreenBtn');
  col.classList.toggle('fullscreen', previewFullscreenOn);
  document.body.classList.toggle('preview-fullscreen-active', previewFullscreenOn);

    : '<i class="fas fa-expand"></i> Fullscreen';

function attachPosDragHandlers() {
  const frame = document.getElementById('previewFrame');
  let doc;
  try { doc = frame.contentDocument; } catch (e) { return; }
  if (!doc) return;
  const frameEl = doc.querySelector('.frame');
  if (!frameEl) return;
  frameEl.style.position = frameEl.style.position || 'relative';

  doc.querySelectorAll('.editor-pos-el').forEach(node => {
    node.style.outline = posModeOn ? '2px dashed rgba(76,168,221,0.6)' : 'none';
    node.style.cursor = posModeOn ? 'move' : 'auto';
    node.onmousedown = null;
    if (!posModeOn) return;

    node.onmousedown = (ev) => {
      ev.preventDefault();
      const elId = node.dataset.elId;
      function onMove(mv) {
        const rect = frameEl.getBoundingClientRect();
        let leftPct = ((mv.clientX - rect.left) / rect.width) * 100;
        let topPct = ((mv.clientY - rect.top) / rect.height) * 100;
        leftPct = Math.max(0, Math.min(95, leftPct));
        topPct = Math.max(0, Math.min(95, topPct));
        node.style.left = leftPct.toFixed(1) + '%';
        node.style.top = topPct.toFixed(1) + '%';
      }
      function onUp(uv) {
        doc.removeEventListener('mousemove', onMove);
        doc.removeEventListener('mouseup', onUp);
        onMove(uv);
        const s = getSelectedSlide();
        const e = s && s.elements.find(x => x.id === elId);
        if (e && e.pos) {
          e.pos.left = node.style.left;
          e.pos.top = node.style.top;
          renderElemCards(s);
        }
      }
      doc.addEventListener('mousemove', onMove);
      doc.addEventListener('mouseup', onUp);
    };
  });
}

  h1.t-content{ font-family:'Baloo 2'; font-weight:800; font-size:24px; color:var(--blue-ink); margin:0 0 16px; }
  h1.t-activity{ font-family:'Baloo 2'; font-weight:800; font-size:22px; color:var(--blue-mid); margin:0 0 20px; position:relative; display:inline-block; }
  h1.t-activity::after{ content:''; position:absolute; bottom:-4px; left:0; width:100%; height:5px; background:var(--gold); border-radius:4px; opacity:.8; }
  .question-block{ background:#FAFCFD; border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; font-size:15px; font-weight:700; display:flex; align-items:center; flex-wrap:wrap; gap:8px; }
  .interactive-input, .interactive-select{ border:2px dashed var(--blue-mid); border-radius:8px; padding:7px 10px; font-weight:800; font-size:15px; color:var(--blue-dark); min-width:90px; text-align:center; background:rgba(255,255,255,0.8); }
  .interactive-select{
    -webkit-appearance:none; -moz-appearance:none; appearance:none;
    border-style:solid; border-color:var(--blue-mid); border-width:2px;
    padding:8px 32px 8px 14px; border-radius:10px; cursor:pointer;
    background-color:#fff;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%231E6FA6' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center;
    box-shadow:0 2px 6px rgba(30,111,166,0.12);
    transition:border-color .15s, box-shadow .15s, background-color .15s;
  }
  .interactive-select:hover{ border-color:var(--blue-dark); box-shadow:0 3px 10px rgba(30,111,166,0.18); }
  .interactive-select:focus{ outline:none; border-color:var(--blue-dark); box-shadow:0 0 0 3px rgba(76,168,221,0.25); }
  .exletter{ display:inline-flex; width:26px; height:26px; border-radius:8px; background:var(--gold); color:var(--blue-ink); align-items:center; justify-content:center; font-family:'Baloo 2'; font-weight:800; font-size:14px; }
  .check-btn{ margin-top:14px; background:var(--blue-mid); color:#fff; padding:10px 24px; border-radius:10px; font-family:'Baloo 2'; font-weight:800; font-size:14px; border:none; }
  ol.agenda{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }
  ol.agenda li{ display:flex; align-items:baseline; gap:12px; font-size:15px; font-weight:700; border-bottom:1px solid rgba(0,0,0,0.04); padding-bottom:10px; }
  ol.agenda li .n{ font-family:'Baloo 2'; font-weight:800; color:var(--blue-dark); }
  ol.agenda li .time{ margin-left:auto; font-weight:800; color:var(--ink-soft); font-size:12px; background:#f0f4f8; padding:2px 8px; border-radius:6px; }
  .video{ position:relative; }
  .editor-pos-el{ z-index:5; }
`;

function updatePreview() {
  const slide = getSelectedSlide();
  const frame = document.getElementById('previewFrame');
  if (!slide) { frame.srcdoc = ''; return; }
  const compiled = compileSlide(slide).replace(/^<!--EDITOR_DATA:.*?-->\n?/, '');
  frame.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;700;800&family=Poppins:wght@400;600;700;800&family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&family=Fredoka:wght@400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>${PREVIEW_CSS}</style></head><body>${compiled}</body></html>`;
  frame.onload = attachPosDragHandlers;
}

// ---------- load / save ----------
document.getElementById('loadBtn').onclick = loadSession;
document.getElementById('saveBtn').onclick = saveSession;
refreshCustomTypeButtons();

async function loadSession() {
  const track = document.getElementById('sel-track').value;
  const level = document.getElementById('sel-level').value;
  const sessionNumber = document.getElementById('sel-session').value;
  setStatus('Loading...', 'info');
  try {
    const result = await callBackendGet(new URLSearchParams({ action: 'getLessonContentForEdit', token: sessionToken, track, level, sessionNumber }));
    if (result.expired) { setStatus('Your session expired — please sign in again from the dashboard.', 'error'); return; }
    if (!result.success) {
      slides = [blankSlide('content')];
      selectedSlideId = slides[0].id;
      setStatus(result.message || 'No content yet for this session — starting blank.', 'info');
    } else {
      slides = (result.slides || []).map(parseSlideHTML);
      if (slides.length === 0) slides = [blankSlide('content')];
      selectedSlideId = slides[0].id;

      const hasInlineMedia = slides.some(s => s.elements.some(el => el.url && el.url.startsWith('data:')));
      if (hasInlineMedia) {
        setStatus('Re-hosting embedded media (this session used inline images)...', 'info');
        for (const s of slides) await migrateInlineDataUrls(s);
        setStatus(`Loaded ${slides.length} slide(s) — embedded media re-hosted. Save to keep this fix.`, 'success');
      } else {
        setStatus(`Loaded ${slides.length} slide(s).`, 'success');
      }
    }
    renderSlideList(); renderElements(); updatePreview();
  } catch (err) {
    console.error('loadSession failed:', err);
    setStatus('Could not reach the server: ' + err.message, 'error');
  }
}

async function saveSession() {
  if (slides.length === 0) { setStatus('Add at least one slide before saving.', 'error'); return; }
  const track = document.getElementById('sel-track').value;
  const level = document.getElementById('sel-level').value;
  const sessionNumber = document.getElementById('sel-session').value;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  setStatus('Saving...', 'info');
  try {
    const compiledSlides = slides.map(compileSlide);
    const slidesJson = JSON.stringify(compiledSlides);
    console.log('Saving payload size (bytes):', new Blob([slidesJson]).size);
    const body = new URLSearchParams({ action: 'setLessonContent', token: sessionToken, track, level, sessionNumber, slidesJson });
    const result = await callBackend(body);
    if (result.expired) { setStatus('Your session expired — please sign in again from the dashboard.', 'error'); return; }
    if (!result.success) { setStatus(result.message || 'Save failed.', 'error'); return; }
    setStatus('Saved ✓', 'success');
  } catch (err) {
    console.error('saveSession failed:', err);
    setStatus('Could not reach the server: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
  }
}
</script>
